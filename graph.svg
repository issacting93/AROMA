<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .box { fill: #f5f5f3; stroke: #c0bfb8; }
  .c-gray rect { fill: #f1efe8; stroke: #888780; }
  .c-gray text { fill: #2c2c2a; }
  .c-blue rect { fill: #e6f1fb; stroke: #185fa5; }
  .c-blue text { fill: #0c447c; }
  .c-teal rect { fill: #e1f5ee; stroke: #0f6e56; }
  .c-teal text { fill: #085041; }
  .box text { fill: #3d3d3a; }
</style>
</defs>

<!-- Root -->
<g class="c-gray">
<rect x="220" y="20" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Social support</text>
</g>

<!-- Branch lines to two super-categories -->
<line x1="340" y1="64" x2="340" y2="90" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="170" y1="90" x2="510" y2="90" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="170" y1="90" x2="170" y2="108" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="510" y1="90" x2="510" y2="108" stroke="#c0bfb8" stroke-width="0.5"/>

<!-- Super-category: Action-facilitating -->
<g class="c-blue">
<rect x="60" y="108" width="220" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="128" text-anchor="middle" dominant-baseline="central">Action-facilitating</text>
</g>

<!-- Super-category: Nurturing -->
<g class="c-teal">
<rect x="400" y="108" width="220" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="128" text-anchor="middle" dominant-baseline="central">Nurturing</text>
</g>

<!-- Branch from Action-facilitating to 2 categories -->
<line x1="120" y1="148" x2="120" y2="170" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="220" y1="148" x2="220" y2="170" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="120" y1="170" x2="220" y2="170" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="120" y1="170" x2="120" y2="188" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="220" y1="170" x2="220" y2="188" stroke="#c0bfb8" stroke-width="0.5"/>

<!-- Branch from Nurturing to 3 categories -->
<line x1="400" y1="148" x2="620" y2="148" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="400" y1="148" x2="400" y2="188" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="510" y1="148" x2="510" y2="188" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="620" y1="148" x2="620" y2="188" stroke="#c0bfb8" stroke-width="0.5"/>

<!-- Category 1: Informational -->
<g class="c-blue">
<rect x="50" y="188" width="140" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="208" text-anchor="middle" dominant-baseline="central">Informational</text>
</g>

<!-- Category 2: Tangible -->
<g class="c-blue">
<rect x="150" y="188" width="140" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="220" y="208" text-anchor="middle" dominant-baseline="central">Tangible</text>
</g>

<!-- Category 3: Emotional -->
<g class="c-teal">
<rect x="330" y="188" width="140" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="400" y="208" text-anchor="middle" dominant-baseline="central">Emotional</text>
</g>

<!-- Category 4: Esteem -->
<g class="c-teal">
<rect x="440" y="188" width="140" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="208" text-anchor="middle" dominant-baseline="central">Esteem</text>
</g>

<!-- Category 5: Network -->
<g class="c-teal">
<rect x="550" y="188" width="120" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="610" y="208" text-anchor="middle" dominant-baseline="central">Network</text>
</g>

<!-- Subcategory connector lines -->
<line x1="120" y1="228" x2="120" y2="252" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="220" y1="228" x2="220" y2="252" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="400" y1="228" x2="400" y2="252" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="510" y1="228" x2="510" y2="252" stroke="#c0bfb8" stroke-width="0.5"/>
<line x1="610" y1="228" x2="610" y2="252" stroke="#c0bfb8" stroke-width="0.5"/>

<!-- Informational subcategories -->
<rect class="box" x="20" y="252" width="200" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="120" y="267" text-anchor="middle" dominant-baseline="central">Advice / guidance</text>
<line x1="120" y1="282" x2="120" y2="296" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="20" y="296" width="200" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="120" y="311" text-anchor="middle" dominant-baseline="central">Referral</text>
<line x1="120" y1="326" x2="120" y2="340" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="20" y="340" width="200" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="120" y="355" text-anchor="middle" dominant-baseline="central">Teaching / information</text>
<line x1="120" y1="370" x2="120" y2="384" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="20" y="384" width="200" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="120" y="399" text-anchor="middle" dominant-baseline="central">Feedback</text>

<!-- Tangible subcategories -->
<rect class="box" x="150" y="252" width="140" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="220" y="267" text-anchor="middle" dominant-baseline="central">Direct assistance</text>
<line x1="220" y1="282" x2="220" y2="296" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="150" y="296" width="140" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="220" y="311" text-anchor="middle" dominant-baseline="central">Willingness to help</text>

<!-- Emotional subcategories -->
<rect class="box" x="320" y="252" width="160" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="400" y="267" text-anchor="middle" dominant-baseline="central">Empathy / understanding</text>
<line x1="400" y1="282" x2="400" y2="296" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="320" y="296" width="160" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="400" y="311" text-anchor="middle" dominant-baseline="central">Expression of care</text>
<line x1="400" y1="326" x2="400" y2="340" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="320" y="340" width="160" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="400" y="355" text-anchor="middle" dominant-baseline="central">Sympathy</text>
<line x1="400" y1="370" x2="400" y2="384" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="320" y="384" width="160" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="400" y="399" text-anchor="middle" dominant-baseline="central">Encouragement</text>
<line x1="400" y1="414" x2="400" y2="428" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="320" y="428" width="160" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="400" y="443" text-anchor="middle" dominant-baseline="central">Prayer / spiritual support</text>

<!-- Esteem subcategories -->
<rect class="box" x="440" y="252" width="140" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="267" text-anchor="middle" dominant-baseline="central">Compliment</text>
<line x1="510" y1="282" x2="510" y2="296" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="440" y="296" width="140" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="311" text-anchor="middle" dominant-baseline="central">Validation</text>
<line x1="510" y1="326" x2="510" y2="340" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="440" y="340" width="140" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="355" text-anchor="middle" dominant-baseline="central">Relief of blame</text>

<!-- Network subcategories -->
<rect class="box" x="550" y="252" width="120" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="610" y="267" text-anchor="middle" dominant-baseline="central">Presence / access</text>
<line x1="610" y1="282" x2="610" y2="296" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="550" y="296" width="120" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="610" y="311" text-anchor="middle" dominant-baseline="central">Belonging signal</text>
<line x1="610" y1="326" x2="610" y2="340" stroke="#c0bfb8" stroke-width="0.5"/>
<rect class="box" x="550" y="340" width="120" height="30" rx="6" stroke-width="0.5"/>
<text class="ts" x="610" y="355" text-anchor="middle" dominant-baseline="central">Similar others</text>

<!-- Divider -->
<line x1="40" y1="490" x2="640" y2="490" stroke="#c0bfb8" stroke-width="0.5"/>

<!-- HAI note header -->
<text class="th" x="340" y="518" text-anchor="middle">HAI relevance — what AI can and cannot do</text>

<!-- Two columns -->
<rect class="box" x="40" y="535" width="280" height="160" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="558">Plausible for AI</text>
<text class="ts" x="60" y="580">Informational (advice, teaching, feedback)</text>
<text class="ts" x="60" y="600">Emotional (empathy, encouragement)</text>
<text class="ts" x="60" y="620">Esteem (validation, compliment)</text>
<text class="ts" x="60" y="640">Network (belonging signal, similar others)</text>
<text class="ts" x="60" y="660">Tangible (willingness to help)</text>
<text class="ts" x="60" y="680" font-style="italic">AI can produce the language of these</text>

<rect class="box" x="360" y="535" width="280" height="160" rx="8" stroke-width="0.5"/>
<text class="th" x="380" y="558">Authority-agency gap</text>
<text class="ts" x="380" y="580">Tangible (direct assistance)</text>
<text class="ts" x="380" y="600">Referral (to real resources)</text>
<text class="ts" x="380" y="620">Relief of blame (needs relational history)</text>
<text class="ts" x="380" y="640">Network (shared lived experience)</text>
<text class="ts" x="380" y="680" font-style="italic">AI lacks standing or capacity to enact these</text>
</svg>